<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - متجري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-100">
    <nav class="bg-gray-800 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">لوحة تحكم المدير</h1>
            <a href="index.html" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">العودة للمتجر</a>
        </div>
    </nav>

    <div class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <!-- Manage Products -->
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">إضافة منتج جديد</h2>
            <form id="product-form" class="space-y-4">
                <input type="text" id="p-name" placeholder="اسم المنتج" required class="w-full border p-2 rounded">
                <input type="number" id="p-price" placeholder="السعر" required class="w-full border p-2 rounded">
                <input type="text" id="p-image" placeholder="رابط الصورة" class="w-full border p-2 rounded">
                <textarea id="p-desc" placeholder="وصف المنتج" class="w-full border p-2 rounded"></textarea>
                <button type="submit" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">إضافة المنتج</button>
            </form>

            <h2 class="text-xl font-bold mt-8 mb-4 border-b pb-2">المنتجات الحالية</h2>
            <div id="admin-products-list" class="space-y-2">
                <!-- Products list -->
            </div>
        </div>

        <!-- Manage Ads & Orders -->
        <div class="space-y-8">
            <!-- Ads -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-bold mb-4 border-b pb-2">إدارة الإعلانات</h2>
                <form id="ad-form" class="space-y-4">
                    <input type="text" id="ad-title" placeholder="عنوان الإعلان" required class="w-full border p-2 rounded">
                    <input type="text" id="ad-desc" placeholder="نص الإعلان" required class="w-full border p-2 rounded">
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">نشر الإعلان</button>
                </form>
                <div id="admin-ads-list" class="mt-4 space-y-2"></div>
            </div>

            <!-- Orders -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-bold mb-4 border-b pb-2">الطلبات الواردة</h2>
                <div id="admin-orders-list" class="space-y-4">
                    <!-- Orders list -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA3wjOh1IZLS5cK8dH0fB6nwKH50iXvFhk",
            authDomain: "ahmad-b755f.firebaseapp.com",
            projectId: "ahmad-b755f",
            storageBucket: "ahmad-b755f.firebasestorage.app",
            messagingSenderId: "1086597289816",
            appId: "1:1086597289816:web:efe60451f04837b75e772d",
            measurementId: "G-E41VP56DLZ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Add Product
        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            await db.collection('products').add({
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                image: document.getElementById('p-image').value,
                description: document.getElementById('p-desc').value
            });
            e.target.reset();
        };

        // Add Ad
        document.getElementById('ad-form').onsubmit = async (e) => {
            e.preventDefault();
            await db.collection('ads').add({
                title: document.getElementById('ad-title').value,
                description: document.getElementById('ad-desc').value
            });
            e.target.reset();
        };

        // Load Products for Admin
        db.collection("products").onSnapshot(snapshot => {
            const list = document.getElementById('admin-products-list');
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `
                    <div class="flex justify-between items-center p-2 border rounded">
                        <span>${p.name} - ${p.price} ر.س</span>
                        <button onclick="deleteDoc('products', '${doc.id}')" class="text-red-500 text-sm">حذف</button>
                    </div>
                `;
            });
        });

        // Load Ads for Admin
        db.collection("ads").onSnapshot(snapshot => {
            const list = document.getElementById('admin-ads-list');
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const ad = doc.data();
                list.innerHTML += `
                    <div class="flex justify-between items-center p-2 border rounded">
                        <span>${ad.title}</span>
                        <button onclick="deleteDoc('ads', '${doc.id}')" class="text-red-500 text-sm">حذف</button>
                    </div>
                `;
            });
        });

        // Load Orders
        db.collection("orders").orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            const list = document.getElementById('admin-orders-list');
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const order = doc.data();
                list.innerHTML += `
                    <div class="p-4 border rounded bg-gray-50">
                        <div class="flex justify-between font-bold">
                            <span>العميل: ${order.customerName}</span>
                            <span class="text-blue-600">${order.status}</span>
                        </div>
                        <p class="text-sm text-gray-600">الهاتف: ${order.phone}</p>
                        <p class="text-sm text-gray-600">العنوان: ${order.address}</p>
                        <button onclick="deleteDoc('orders', '${doc.id}')" class="mt-2 text-red-500 text-xs">حذف الطلب</button>
                    </div>
                `;
            });
        });

        async function deleteDoc(col, id) {
            if(confirm('هل أنت متأكد من الحذف؟')) {
                await db.collection(col).doc(id).delete();
            }
        }
    </script>
</body>
</html>
