<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الإلكتروني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">متجري</h1>
            <div class="space-x-4 space-x-reverse">
                <a href="index.html" class="text-gray-700 hover:text-blue-600">الرئيسية</a>
                <a href="admin.html" class="text-gray-700 hover:text-blue-600">لوحة الإدارة</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section (Ads) -->
    <div id="ads-container" class="container mx-auto mt-6 px-4">
        <!-- Ads will be loaded here -->
    </div>

    <!-- Products Section -->
    <div class="container mx-auto mt-10 px-4">
        <h2 class="text-2xl font-bold mb-6">منتجاتنا</h2>
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Products will be loaded here -->
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="order-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg max-w-md w-full">
            <h3 class="text-xl font-bold mb-4">إتمام الطلب</h3>
            <p id="modal-product-name" class="mb-4 text-gray-600"></p>
            <form id="order-form">
                <input type="hidden" id="order-product-id">
                <div class="mb-4">
                    <label class="block mb-1">الاسم الكامل</label>
                    <input type="text" id="customer-name" required class="w-full border p-2 rounded">
                </div>
                <div class="mb-4">
                    <label class="block mb-1">رقم الهاتف</label>
                    <input type="tel" id="customer-phone" required class="w-full border p-2 rounded">
                </div>
                <div class="mb-4">
                    <label class="block mb-1">العنوان</label>
                    <textarea id="customer-address" required class="w-full border p-2 rounded"></textarea>
                </div>
                <div class="flex justify-end space-x-2 space-x-reverse">
                    <button type="button" onclick="closeModal()" class="bg-gray-300 px-4 py-2 rounded">إلغاء</button>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">تأكيد الطلب</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA3wjOh1IZLS5cK8dH0fB6nwKH50iXvFhk",
            authDomain: "ahmad-b755f.firebaseapp.com",
            projectId: "ahmad-b755f",
            storageBucket: "ahmad-b755f.firebasestorage.app",
            messagingSenderId: "1086597289816",
            appId: "1:1086597289816:web:efe60451f04837b75e772d",
            measurementId: "G-E41VP56DLZ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load Ads
        db.collection("ads").onSnapshot(snapshot => {
            const container = document.getElementById('ads-container');
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const ad = doc.data();
                container.innerHTML += `
                    <div class="bg-blue-100 p-6 rounded-xl mb-4 text-center">
                        <h3 class="text-xl font-bold text-blue-800">${ad.title}</h3>
                        <p class="text-blue-600">${ad.description}</p>
                    </div>
                `;
            });
        });

        // Load Products
        db.collection("products").onSnapshot(snapshot => {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            snapshot.forEach(doc => {
                const product = doc.data();
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow hover:shadow-lg transition">
                        <img src="${product.image || 'https://via.placeholder.com/150'}" class="w-full h-48 object-cover rounded mb-4">
                        <h3 class="font-bold text-lg">${product.name}</h3>
                        <p class="text-gray-600 text-sm mb-2">${product.description}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-blue-600 font-bold">${product.price} ر.س</span>
                            <button onclick="openModal('${doc.id}', '${product.name}')" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">طلب الآن</button>
                        </div>
                    </div>
                `;
            });
        });

        function openModal(id, name) {
            document.getElementById('order-product-id').value = id;
            document.getElementById('modal-product-name').innerText = `طلب منتج: ${name}`;
            document.getElementById('order-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('order-modal').classList.add('hidden');
        }

        document.getElementById('order-form').onsubmit = async (e) => {
            e.preventDefault();
            const order = {
                productId: document.getElementById('order-product-id').value,
                customerName: document.getElementById('customer-name').value,
                phone: document.getElementById('customer-phone').value,
                address: document.getElementById('customer-address').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'جديد'
            };
            await db.collection('orders').add(order);
            alert('تم إرسال طلبك بنجاح!');
            closeModal();
            e.target.reset();
        };
    </script>
</body>
</html>
